services:
  db:
    image: postgres:16-alpine
    container_name: ddd-cv-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cv_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cv_bot}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: ${BOT_IMAGE:-ddd-cv-bot:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddd-cv-bot-migrate
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cv_bot}
    depends_on:
      db:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]

  bot:
    image: ${BOT_IMAGE:-ddd-cv-bot:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ddd-cv-bot-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cv_bot}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.interfaces.bot.bot"]

volumes:
  postgres_data:
